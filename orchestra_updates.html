<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orchestra Updates</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 1rem;
    }

    .post {
      font-size: clamp(1.2rem, 4.5vw, 1.6rem);
      border-bottom: 1px solid #ddd;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
    }

    .time {
      font-size: 1rem;
      color: #666;
      margin-top: 0.25rem;
    }

    .status {
      font-size: 0.9rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div id="feed">Loading…</div>
<!---------FETCH SCRIPT---------------------------------------------->
  <script>
  fetch("https://raw.githubusercontent.com/jenkinscghs/orchestra-updates/main/feed.json")
    .then(res => res.json())
    .then(data => {
      document.getElementById("feed").innerHTML =
        data.slice(0,10).map(item => `
          <div class="post">
            ${item.body}
            <div class="time">
              ${new Date(item.ts).toLocaleString()}
            </div>
          </div>
        `).join("");
    })
    .catch(err => {
      console.error(err);
      document.getElementById("feed").textContent =
        "Unable to load updates.";
    });
</script>

  <!CHIME SCRIPT----------------------------------------------------->
<script>
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playChime() {
    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }

    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc1.type = "sine";
    osc2.type = "triangle";

    osc1.frequency.value = 880;   // bell tone
    osc2.frequency.value = 1320;  // harmonic

    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.15, audioCtx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1);

    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(audioCtx.destination);

    osc1.start();
    osc2.start();
    osc1.stop(audioCtx.currentTime + 1);
    osc2.stop(audioCtx.currentTime + 1);
  }

  // Enable audio on first tap/click
  document.addEventListener("click", () => {
    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }
  }, { once: true });
</script>

  
</body>
</html>
