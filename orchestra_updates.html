<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orchestra Updates</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 1rem;
    }

    .post {
      font-size: clamp(1.2rem, 4.5vw, 1.6rem);
      border-bottom: 1px solid #ddd;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
    }

    .time {
      font-size: 1rem;
      color: #666;
      margin-top: 0.25rem;
    }

    .status {
      font-size: 0.9rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div id="feed">Loading…</div>
<!---------FETCH SCRIPT---------------------------------------------->
 <script>
  const FEED_URL =
    "https://raw.githubusercontent.com/jenkinscghs/orchestra-updates/main/feed.json";

  let lastSeenTs = localStorage.getItem("lastSeenTs");

  function fetchFeed() {
    fetch(FEED_URL, { cache: "no-store" })
      .then(res => res.json())
      .then(data => {
        if (!Array.isArray(data) || data.length === 0) return;

        // Sort newest → oldest
        data.sort((a, b) => new Date(b.ts) - new Date(a.ts));

        const newestTs = data[0].ts;

        // ✅ Detect new content
        if (lastSeenTs && newestTs !== lastSeenTs) {
          playChime();
        }

        lastSeenTs = newestTs;
        localStorage.setItem("lastSeenTs", newestTs);

        render(data.slice(0, 10));
      })
      .catch(err => console.warn("Feed fetch failed", err));
  }

  function render(posts) {
    document.getElementById("feed").innerHTML =
      posts.map(item => `
        <div class="post">
          ${item.body}
          <div class="time">
            ${new Date(item.ts).toLocaleDateString(undefined, {
              month: "short",
              day: "numeric",
              hour: "numeric",
              minute: "2-digit"
            })}
          </div>
        </div>
      `).join("");
  }

  // Initial load
  fetchFeed();

  // ✅ Poll every 30 seconds (safe + fast enough)
  setInterval(fetchFeed, 30000);
</script>



  <!CHIME SCRIPT----------------------------------------------------->
<script>
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playChime() {
    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }

    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc1.type = "sine";
    osc2.type = "triangle";

    osc1.frequency.value = 880;   // bell tone
    osc2.frequency.value = 1320;  // harmonic

    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.15, audioCtx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1);

    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(audioCtx.destination);

    osc1.start();
    osc2.start();
    osc1.stop(audioCtx.currentTime + 1);
    osc2.stop(audioCtx.currentTime + 1);
  }

  // Enable audio on first tap/click
  document.addEventListener("click", () => {
    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }
  }, { once: true });
</script>

  
</body>
</html>
